<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RepoMind</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="topbar-left">
          <div class="brand">RepoMind</div>
          <div class="topbar-search-wrap">
            <input id="global-search" type="search" placeholder="Search knowledge…" aria-label="Search" />
            <div id="search-dropdown" class="search-dropdown hidden"></div>
          </div>
        </div>
        <div class="topbar-right">
          <button type="button" id="theme-toggle" class="btn-ghost" data-theme-toggle aria-pressed="false">Dark mode</button>
          <a href="/graph.html" id="graph-link" class="btn-ghost">Graph</a>
          <button type="button" id="health-toggle" class="btn-ghost" aria-pressed="false">Health</button>
          <div id="stats" class="stats"></div>
        </div>
      </header>
      <div class="layout">
        <aside id="sidebar" class="sidebar"></aside>
        <div class="workspace">
          <main id="workspace" class="workspace-main"></main>
        </div>
      </div>
      <div id="banner" class="banner hidden"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
